services:
  postgres:
    image: postgres:16-alpine
    env_file: .env
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    env_file: .env
    restart: unless-stopped
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 5s
      retries: 5

  docling-serve:
    image: quay.io/docling-project/docling-serve:latest
    restart: unless-stopped
    environment:
      DOCLING_SERVE_MAX_SYNC_WAIT: 600
      UVICORN_WORKERS: 1
    expose:
      - "5001"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/5001'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build: ./backend
    env_file: .env
    restart: unless-stopped
    expose:
      - "3001"
    depends_on:
      agents-api:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  agents-api:
    build: ./agents
    env_file: .env
    restart: unless-stopped
    environment:
      AGENT_CONFIG_PATH: /app/agent_config.yaml
      AGENTS_RESEARCH_TIMEOUT_SECONDS: ${AGENTS_RESEARCH_TIMEOUT_SECONDS:-1800}
      BAND_REST_URL: ${BAND_REST_URL:-https://app.band.ai/api/v1}
      BAND_WS_URL: ${BAND_WS_URL:-wss://app.band.ai/api/v1/socket/websocket}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.aimlapi.com/v1}
    volumes:
      - ./agents/agent_config.yaml:/app/agent_config.yaml:ro
    expose:
      - "8001"
    healthcheck:
      test:
        [
          "CMD",
          "uv",
          "run",
          "--no-sync",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  rag-worker:
    build: ./rag-worker
    env_file: .env
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      docling-serve:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
  redis_data:
  qdrant_data:
